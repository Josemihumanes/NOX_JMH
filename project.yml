name: Strand
options:
  bundleIdPrefix: com.jmh
  createIntermediateGroups: true
  groupSortPosition: top
  # Base/development language. The in-source UI strings are authored in English (US);
  # the String Catalog (Strand/Resources/Localizable.xcstrings) carries this as the
  # source language and is where additional languages are added.
  developmentLanguage: en
settings:
  base:
    MARKETING_VERSION: "8.2.2"
    CURRENT_PROJECT_VERSION: "172"
    SWIFT_VERSION: "5.0"
    # Emit localizable strings so Xcode auto-extracts every LocalizedStringKey into the
    # String Catalog on build (the English (US) base entries).
    SWIFT_EMIT_LOC_STRINGS: YES
    SWIFT_STRICT_CONCURRENCY: minimal
    DEVELOPMENT_TEAM: ""
    CODE_SIGN_STYLE: Automatic
  configs:
    Release:
      # Distribution builds must produce a universal binary, not just the host arch.
      ONLY_ACTIVE_ARCH: NO
packages:
  # Renders the Coach's LLM replies (GitHub-flavored Markdown — bold, lists,
  # headings, tables). Pinned exactly for reproducible community builds.
  MarkdownUI:
    url: https://github.com/gonzalezreal/swift-markdown-ui
    exactVersion: 2.4.1
  WhoopProtocol:
    path: Packages/WhoopProtocol
  WhoopStore:
    path: Packages/WhoopStore
  StrandAnalytics:
    path: Packages/StrandAnalytics
  StrandImport:
    path: Packages/StrandImport
  StrandDesign:
    path: Packages/StrandDesign
  # Clean-room local Oura ring BLE protocol (framing, auth, decoders, driver). Pure value types,
  # zero CoreBluetooth, so it stays headless/JVM-testable; the app target imports it for OuraLiveSource.
  OuraProtocol:
    path: Packages/OuraProtocol
  # Compresses the full-database `.noopbak` backup (single-entry deflate ZIP) in DataBackup.swift.
  # Already resolved transitively via StrandImport; linked directly so the app target can
  # `import ZIPFoundation`. Same exact version as StrandImport's, so SPM resolves one copy.
  # Supply-chain: pinned EXACT (not `from:`) so a clean resolve can't auto-pull a newer —
  # potentially compromised — upstream release. Bump deliberately, in lockstep with the
  # Packages/*/Package.swift exact constraints and the committed Package.resolved.
  ZIPFoundation:
    url: https://github.com/weichsel/ZIPFoundation.git
    exactVersion: 0.9.20
targets:
  # ---------------------------------------------------------------------------
  # iOS app target (community build-from-source; never distributed via the App
  # Store — NOOP stays anonymous). Reuses the five shared packages. See docs/IOS.md.
  NOOPiOS:
    type: application
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: Strand
        excludes:
          - "Resources/Info.plist"
          - "Resources/Strand.entitlements"
          - "Resources/Assets.xcassets"
          - "App/StrandApp.swift"
          - "App/RootView.swift"
          # ContentView embeds RootView() (the macOS NavigationSplitView sidebar shell), which is
          # excluded above — so ContentView cannot compile on iOS. The iOS shell is RootTabView,
          # wired in StrandiOS/App/StrandiOSApp.swift (which reproduces ContentView's onboarding/
          # Terms/What's-New gates around the TabView). Without this exclude the iOS target fails to
          # resolve RootView().
          - "App/ContentView.swift"
          - "MenuBar"
          - "Data/NotificationSettingsStore.swift"
          - "Screens/NotificationSettingsView.swift"
          # macOS-only AppIntents (BuzzStrap/MarkMoment) — iOS uses StrandiOS/System/NOOPAppIntents.swift.
          # Without this exclude both compile into the iOS target and collide on NOOPAppIntents.stringsdata.
          - "System/NOOPAppIntents.swift"
      - path: StrandiOS
        excludes:
          - "Resources/Info.plist"
          - "Resources/NOOP.entitlements"
    info:
      path: StrandiOS/Resources/Info.plist
      properties:
        CFBundleName: NOX
        CFBundleDisplayName: NOX
        CFBundleShortVersionString: "$(MARKETING_VERSION)"
        CFBundleVersion: "$(CURRENT_PROJECT_VERSION)"
        LSApplicationCategoryType: public.app-category.healthcare-fitness
        UILaunchScreen: {}
        # Restringe los idiomas que iOS puede seleccionar en tiempo de ejecución a solo inglés
        # y español. Las demás traducciones siguen presentes en Localizable.xcstrings (por si
        # se quiere revertir), pero iOS nunca las ofrecerá como idioma activo de la app.
        CFBundleLocalizations:
          - en
          - es
        # Alternate app icons (v3 "Titanium & Gold"). The primary icon stays the asset-catalog
        # AppIcon (machined titanium); the alternate "AppIcon-Navy" (blued titanium) is declared
        # here so UIApplication.setAlternateIconName("AppIcon-Navy") can switch to it at runtime.
        # CFBundleIconFiles is intentionally empty — the artwork lives in the asset catalog, shipped
        # via ASSETCATALOG_COMPILER_INCLUDE_ALL_APPICON_ASSETS, so no loose PNGs are listed here.
        CFBundleIcons:
          CFBundleAlternateIcons:
            AppIcon-Navy:
              CFBundleIconFiles: []
              UIPrerenderedIcon: false
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
        UISupportedInterfaceOrientations~ipad:
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationPortraitUpsideDown
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight
        UIBackgroundModes:
          - bluetooth-central
          # #524: keep recording an outdoor workout's GPS route while the app is backgrounded (screen off),
          # matching Android's foreground-service capture. Required by GpsWorkoutRecorder's
          # allowsBackgroundLocationUpdates; without this mode iOS crashes when background updates start.
          - location
          # #510: the scheduled debug auto-export submits a BGAppRefreshTaskRequest so iOS can wake the
          # backgrounded app near the user's chosen time to write the overnight strap-log drop. BGAppRefresh
          # needs the "fetch" background mode; the task id below must also be permitted (and registered at
          # launch in StrandiOSApp.init) or the submit fails gracefully and only the foreground/"Run now"
          # paths run.
          - fetch
        # #510: permit the scheduled debug auto-export's BGAppRefreshTask identifier. MUST match
        # ScheduledDebugExport.bgTaskIdentifier EXACTLY and be registered at launch (StrandiOSApp.init);
        # otherwise iOS refuses to schedule or deliver the background drop.
        BGTaskSchedulerPermittedIdentifiers:
          - com.jmh.nox.debugexport
        NSBluetoothAlwaysUsageDescription: "NOX connects directly to your WHOOP strap over Bluetooth to read heart rate, R-R intervals, battery, and sensor data locally on your iPhone. Nothing leaves your device."
        NSLocationWhenInUseUsageDescription: "NOX records your route during an outdoor workout to show distance, pace, and a map, and keeps recording while the screen is off. The route stays on your device. Nothing leaves it."
        NSHealthShareUsageDescription: "NOX reads your own Apple Health data on-device to compute recovery, strain, and sleep. Nothing leaves your device."
        NSHealthUpdateUsageDescription: "NOX writes the metrics it computes from your strap back into Apple Health, on-device and only when you allow it."
        # #187: the opt-in AI Coach's "Custom (OpenAI-compatible)" provider can point at a LOCAL LLM on
        # the LAN (Ollama / LM Studio at http://192.168.x.x:11434). ATS blocks cleartext by default;
        # NSAllowsLocalNetworking exempts loopback/.local/private-LAN hosts ONLY — public HTTPS endpoints
        # are unaffected, so cloud providers stay TLS. Mirrors the macOS target.
        NSAppTransportSecurity:
          NSAllowsLocalNetworking: true
        # #155: expose the app's Documents folder to Files/Shortcuts so the user's Siri Shortcut can
        # read the opt-in noop_sync.txt drop file (Apple-Health-free export for sideloaded installs).
        # Both keys are required for the folder to actually appear in Files.
        UIFileSharingEnabled: true
        LSSupportsOpeningDocumentsInPlace: true
    entitlements:
      path: StrandiOS/Resources/NOOP.entitlements
      properties:
        com.apple.developer.healthkit: true
        com.apple.developer.healthkit.access: []
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.jmh.nox
        PRODUCT_NAME: NOX
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        # Ship every *.appiconset (not just the primary AppIcon) so the alternate "AppIcon-Navy"
        # set is compiled into the bundle and is available to UIApplication.setAlternateIconName.
        ASSETCATALOG_COMPILER_INCLUDE_ALL_APPICON_ASSETS: YES
        GENERATE_INFOPLIST_FILE: NO
        TARGETED_DEVICE_FAMILY: "1,2"
        SWIFT_EMIT_LOC_STRINGS: YES
    dependencies:
      - package: WhoopProtocol
      - package: WhoopStore
      - package: StrandAnalytics
      - package: StrandImport
      - package: StrandDesign
      - package: MarkdownUI
      - package: ZIPFoundation

  # ---------------------------------------------------------------------------
  # watchOS app and its complication, and the WidgetKit/Live Activity iOS extension, were removed
  # entirely (personal iOS-only build): see git history before this commit for NOOPiOSWidgets,
  # NOOPWatch and NOOPWatchComplications if ever revisited under a paid developer account (App
  # Groups need one to actually share a container between an app and its extensions).

# Explicit scheme so `xcodebuild -scheme NOOPiOS …` builds the iOS app.
schemes:
  NOOPiOS:
    build:
      targets:
        NOOPiOS: all
    run:
      config: Debug
