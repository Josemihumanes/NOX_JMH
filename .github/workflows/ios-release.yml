name: iOS Release Build (unsigned)

# Compila el target NOOPiOS para dispositivo real, SIN firmar (igual que hace
# NOOP oficialmente para mantenerse anónimo), lo empaqueta como .ipa y lo publica
# como asset de un Release de GitHub. AltStore/SideStore firman ese .ipa en tu
# propio iPhone con tu Apple ID gratuita al instalarlo.
#
# Cómo dispararlo:
#   1) Manualmente: pestaña "Actions" del repo -> "iOS Release Build (unsigned)"
#      -> "Run workflow" -> escribe la versión (ej. v1.0.0).
#   2) Automático: git tag v1.0.0 && git push origin v1.0.0

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Versión a compilar (ej. v1.0.0)"
        required: true
        default: "v1.0.0"
  push:
    tags:
      - 'v*.*.*'

permissions:
  contents: write

jobs:
  build-ipa:
    runs-on: macos-15
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Resolve version
        id: ver
        run: |
          if [ -n "${{ github.event.inputs.version }}" ]; then
            echo "version=${{ github.event.inputs.version }}" >> "$GITHUB_OUTPUT"
          else
            echo "version=${GITHUB_REF_NAME}" >> "$GITHUB_OUTPUT"
          fi

      - name: Install XcodeGen
        run: brew install xcodegen

      - name: Generate Xcode project
        run: xcodegen generate

      - name: Build NOOPiOS for device (unsigned)
        run: >-
          xcodebuild -scheme NOOPiOS -configuration Release
          -destination 'generic/platform=iOS'
          -derivedDataPath build
          CODE_SIGNING_ALLOWED=NO CODE_SIGNING_REQUIRED=NO
          clean build

      - name: Package unsigned .ipa
        id: package
        run: |
          set -e
          APP_PATH=$(find build/Build/Products -maxdepth 2 -name "*.app" | head -n 1)
          if [ -z "$APP_PATH" ]; then
            echo "No se encontró el .app compilado" >&2
            exit 1
          fi
          echo "App encontrada en: $APP_PATH"
          mkdir -p Payload
          cp -R "$APP_PATH" Payload/
          VERSION="${{ steps.ver.outputs.version }}"
          VERSION_NUM="${VERSION#v}"
          IPA_NAME="NOOP-${VERSION}-ios.ipa"
          zip -r "$IPA_NAME" Payload
          SIZE=$(stat -f%z "$IPA_NAME")
          echo "ipa_name=$IPA_NAME" >> "$GITHUB_OUTPUT"
          echo "version_num=$VERSION_NUM" >> "$GITHUB_OUTPUT"
          echo "size=$SIZE" >> "$GITHUB_OUTPUT"
          echo "Tamaño del .ipa: $SIZE bytes"

      - name: Create Release and upload .ipa
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.ver.outputs.version }}
          name: "NOOP ${{ steps.ver.outputs.version }} (build personal)"
          body: |
            Build personal no firmado de NOOP, para instalar vía AltStore/SideStore.

            **Tamaño del .ipa:** ${{ steps.package.outputs.size }} bytes.
            Recuerda actualizar el campo "size" en altstore-source.json con este valor.
          files: ${{ steps.package.outputs.ipa_name }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
